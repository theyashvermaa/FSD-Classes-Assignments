<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch Gemini API</title>
</head>

<body>
    <div id="ask-here">
        <h1>I AM AI</h1>
        <input type="text" placeholder="Ask Anything Here!!" id="prompt">
        <button id="request">Send</button>

        <p id="response"></p>
    </div>

</body>
<script>
    const key = "Your_API_Key";
    const request = document.getElementById("request");

    request.addEventListener("click", fetchGemini);

    async function fetchGemini() {

        const userText = document.getElementById("prompt").value;

        const systemPrompt = `You are a historian and storyteller of WWE storylines.
                            Your role is to explain rivalries, character arcs, championships, and major events in WWE as if they are part of an ongoing fictional universe.
                            
                    1. Answer questions only within the WWE storyline universe (kayfabe).
                    2. Never mention real names of wrestlers or their identities outside WWE.
                    3. Do not discuss scripting, backstage decisions, contracts, or production details.
                    4. Treat all events as part of the official storyline world.
                    5. Focus on rivalries, championships, betrayals, alliances, and major storyline moments from past and present WWE shows.
                    6. If a question asks about real-life information or behind-the-scenes details, politely explain that you only discuss WWE storylines.

                    Response format:
                    Storyline context:
                    Explain the rivalry or situation.

                    Key moments:
                    Describe important events or matches in the storyline.

                    Current or lasting impact:
                    Explain how this affects the characters or championships in the WWE universe.`;

        const finalPrompt = systemPrompt + "User Question" + userText;

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: finalPrompt }],
                    },
                    ],
                }),
            },
        );

        const data = await response.json();

        const finalResponse = data.candidates[0].content.parts[0].text;
        document.getElementById("response").innerText = finalResponse;
    }

</script>

</html>
